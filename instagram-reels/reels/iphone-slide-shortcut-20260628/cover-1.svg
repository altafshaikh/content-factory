<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2538"/>
      <stop offset="100%" stop-color="#141e2d"/>
    </linearGradient>
    <radialGradient id="heroGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Hero glow -->
  <ellipse cx="540" cy="390" rx="460" ry="230" fill="url(#heroGlow)"/>

  <!-- Top accent line -->
  <rect x="80" y="80" width="920" height="4" rx="2" fill="url(#accent)"/>

  <!-- Category label -->
  <text x="80" y="154"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="700" letter-spacing="8" fill="#22d3ee">AI PRODUCTIVITY</text>

  <!-- Hero number -->
  <text x="540" y="356"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="220" font-weight="900" text-anchor="middle" fill="url(#accent)">30+</text>

  <!-- Hero sub-label line 1 -->
  <text x="540" y="430"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="52" font-weight="900" text-anchor="middle" fill="#e2e8f0">ideas. Zero slide decks.</text>

  <!-- Hero sub-label line 2 -->
  <text x="540" y="492"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="300" text-anchor="middle" letter-spacing="1" fill="#64748b">every time I tried, the friction stopped it</text>

  <!-- Divider -->
  <rect x="80" y="528" width="920" height="1" fill="#ffffff" fill-opacity="0.1"/>

  <!-- Stat tile 1: x=80, y=548, w=450, h=268 -->
  <rect x="80" y="548" width="450" height="268" rx="16" fill="url(#tile)"/>
  <rect x="80" y="548" width="450" height="4" rx="2" fill="url(#accent)"/>
  <text x="305" y="682"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="80" font-weight="900" text-anchor="middle" fill="url(#accent)">30+</text>
  <text x="305" y="736"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" letter-spacing="5" text-anchor="middle" fill="#64748b">IDEAS TRAPPED</text>
  <text x="305" y="768"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" text-anchor="middle" fill="#475569">in my Notes app</text>

  <!-- Stat tile 2: x=550, y=548, w=450, h=268 -->
  <rect x="550" y="548" width="450" height="268" rx="16" fill="url(#tile)"/>
  <rect x="550" y="548" width="450" height="4" rx="2" fill="url(#accent)"/>
  <text x="775" y="676"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="70" font-weight="900" text-anchor="middle" fill="url(#accent)">30 min</text>
  <text x="775" y="736"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" letter-spacing="5" text-anchor="middle" fill="#64748b">SETUP TIME</text>
  <text x="775" y="768"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" text-anchor="middle" fill="#475569">one iPhone shortcut</text>

  <!-- Divider -->
  <rect x="80" y="852" width="920" height="1" fill="#ffffff" fill-opacity="0.1"/>

  <!-- Transformation section label -->
  <text x="80" y="902"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="700" letter-spacing="6" fill="#475569">THE SHIFT</text>

  <!-- BEFORE bar -->
  <text x="80" y="952"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" letter-spacing="5" fill="#64748b">BEFORE</text>
  <rect x="210" y="932" width="740" height="22" rx="11" fill="#1e2a3a"/>
  <rect x="210" y="932" width="740" height="22" rx="11" fill="#ef4444" fill-opacity="0.45"/>
  <text x="960" y="950"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" text-anchor="end" fill="#ef4444">stuck</text>

  <!-- Arrow connector -->
  <rect x="539" y="968" width="2" height="28" fill="#22d3ee" fill-opacity="0.4"/>
  <polygon points="530,996 550,996 540,1013" fill="#22d3ee" fill-opacity="0.4"/>

  <!-- AFTER bar -->
  <text x="80" y="1037"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" letter-spacing="5" fill="#22d3ee">AFTER</text>
  <rect x="210" y="1017" width="740" height="22" rx="11" fill="#1e2a3a"/>
  <rect x="210" y="1017" width="185" height="22" rx="11" fill="url(#accent)"/>
  <text x="960" y="1035"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" text-anchor="end" fill="#22d3ee">done</text>

  <!-- Insight text -->
  <text x="540" y="1098"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="32" font-weight="600" text-anchor="middle" fill="#e2e8f0">The gap was design, not willpower.</text>
  <text x="540" y="1144"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="300" text-anchor="middle" fill="#94a3b8">One shortcut removed it.</text>

  <!-- Divider -->
  <rect x="80" y="1188" width="920" height="1" fill="#ffffff" fill-opacity="0.1"/>

  <!-- Big tagline -->
  <text x="540" y="1362"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="86" font-weight="900" text-anchor="middle" fill="#e2e8f0">Design around</text>
  <text x="540" y="1464"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="86" font-weight="900" text-anchor="middle" fill="url(#accent)">the friction.</text>

  <!-- Footer divider -->
  <rect x="80" y="1518" width="920" height="1" fill="#ffffff" fill-opacity="0.1"/>

  <!-- Handle -->
  <text x="540" y="1618"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="46" font-weight="700" text-anchor="middle" fill="#22d3ee">@teachmebro</text>

  <!-- Author -->
  <text x="540" y="1678"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="600" text-anchor="middle" fill="#94a3b8">Altaf Shaikh</text>

  <!-- Domain -->
  <text x="540" y="1718"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="400" text-anchor="middle" fill="#475569">AI Productivity &#183; AI Engineering</text>

  <!-- Bottom accent line -->
  <rect x="80" y="1858" width="920" height="4" rx="2" fill="url(#accent)"/>
</svg>
