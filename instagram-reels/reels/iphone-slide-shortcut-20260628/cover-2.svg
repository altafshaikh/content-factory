<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg)"/>

  <!-- Subtle top-left glow -->
  <ellipse cx="160" cy="180" rx="300" ry="200" fill="#22d3ee" fill-opacity="0.04"/>

  <!-- Top decoration: short rule + category -->
  <rect x="80" y="112" width="56" height="3" rx="1" fill="#22d3ee"/>
  <text x="154" y="122"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="700" letter-spacing="7" fill="#475569">AI PRODUCTIVITY</text>

  <!-- Giant headline line 1: "Notes" -->
  <text x="80" y="390"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="210" font-weight="900" fill="#e2e8f0">Notes</text>

  <!-- Giant headline line 2: "&#8594; Slides" in gradient -->
  <text x="80" y="614"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="210" font-weight="900" fill="url(#accent)">&#8594; Slides</text>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <text x="80" y="698"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="62" font-weight="900" fill="url(#accent)">30+</text>
  <text x="80" y="732"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="400" letter-spacing="3" fill="#64748b">ideas trapped in Notes</text>

  <!-- Vertical divider -->
  <rect x="380" y="658" width="1" height="84" fill="#ffffff" fill-opacity="0.08"/>

  <!-- Stat 2 -->
  <text x="410" y="698"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="62" font-weight="900" fill="url(#accent)">30 min</text>
  <text x="410" y="732"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="400" letter-spacing="3" fill="#64748b">to set up the shortcut</text>

  <!-- Left-border quote block -->
  <rect x="80" y="784" width="5" height="96" rx="2" fill="url(#accentV)"/>
  <text x="106" y="828"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="36" font-weight="600" fill="#e2e8f0">Design around the friction.</text>
  <text x="106" y="872"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="300" fill="#94a3b8">Not through it.</text>

  <!-- Divider -->
  <rect x="80" y="930" width="920" height="1" fill="#ffffff" fill-opacity="0.1"/>

  <!-- Handle: large, accent, left-aligned -->
  <text x="80" y="1026"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="44" font-weight="700" fill="#22d3ee">@teachmebro</text>

  <!-- Author -->
  <text x="80" y="1082"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="600" fill="#cbd5e1">Altaf Shaikh</text>

  <!-- Domain -->
  <text x="80" y="1116"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="400" fill="#475569">AI Productivity &#183; AI Engineering</text>

  <!-- Bottom accent line -->
  <rect x="80" y="1290" width="920" height="4" rx="2" fill="url(#accent)"/>
</svg>
