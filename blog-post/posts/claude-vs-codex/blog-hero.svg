<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F6F0E2"/>
      <stop offset="100%" stop-color="#EDE5CE"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Decorative network — top right -->
  <g stroke="#8A7E68" stroke-width="1.2" fill="none" opacity="0.20">
    <line x1="1195" y1="38" x2="1345" y2="88"/>
    <line x1="1345" y1="88" x2="1475" y2="52"/>
    <line x1="1345" y1="88" x2="1390" y2="158"/>
    <line x1="1475" y1="52" x2="1515" y2="118"/>
    <line x1="1390" y1="158" x2="1515" y2="118"/>
    <line x1="1195" y1="38" x2="1240" y2="105"/>
    <line x1="1240" y1="105" x2="1345" y2="88"/>
  </g>
  <circle cx="1195" cy="38" r="4.5" fill="#8A7E68" opacity="0.30"/>
  <circle cx="1345" cy="88" r="6" fill="#8A7E68" opacity="0.28"/>
  <circle cx="1475" cy="52" r="4.5" fill="#8A7E68" opacity="0.30"/>
  <circle cx="1390" cy="158" r="4" fill="#8A7E68" opacity="0.25"/>
  <circle cx="1515" cy="118" r="3.5" fill="#8A7E68" opacity="0.22"/>
  <circle cx="1240" cy="105" r="3.5" fill="#8A7E68" opacity="0.22"/>
  <!-- Accent dot pair — top right -->
  <circle cx="1528" cy="42" r="11" fill="#C94E1A"/>
  <circle cx="1556" cy="42" r="11" fill="#1B57C5"/>

  <!-- CATEGORY LABEL -->
  <line x1="80" y1="76" x2="174" y2="76" stroke="#1A1A1A" stroke-width="1.5" opacity="0.65"/>
  <text x="188" y="83"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17" font-weight="700" letter-spacing="5" fill="#4A3E30">AI EXPERIMENT #1 &#183; CLAUDE VS CODEX</text>

  <!-- HERO HEADLINE -->
  <!-- Line 1 -->
  <text x="80" y="265"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="155" font-weight="900" fill="#1A1A1A">One Opened</text>
  <!-- Line 2: "a" dark, "Browser." orange -->
  <text x="80" y="445"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="155" font-weight="900">
    <tspan fill="#1A1A1A">a </tspan><tspan fill="#C94E1A">Browser.</tspan>
  </text>

  <!-- SUB-HEADLINE with left accent bar -->
  <rect x="80" y="503" width="5" height="72" rx="2.5" fill="#C94E1A"/>
  <text x="103" y="537"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="29" font-weight="700" fill="#1A1A1A">The other needed 3 re-explains.</text>
  <text x="103" y="572"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="29" font-weight="400" fill="#4A3E30">I became the bottleneck.</text>

  <!-- STATS ROW -->
  <!-- Left: 3x re-explains -->
  <text x="80" y="672"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="70" font-weight="900" fill="#C94E1A">3&#215;</text>
  <text x="80" y="703"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17" font-weight="400" letter-spacing="0.5" fill="#7A6E58">re-explains with Claude</text>
  <!-- Vertical divider -->
  <line x1="326" y1="625" x2="326" y2="713" stroke="#1A1A1A" stroke-width="1" opacity="0.18"/>
  <!-- Right: 0x with Codex -->
  <text x="350" y="672"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="70" font-weight="900" fill="#1B57C5">0&#215;</text>
  <text x="350" y="703"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17" font-weight="400" letter-spacing="0.5" fill="#7A6E58">with Codex&#8217;s self-testing</text>

  <!-- SEPARATOR -->
  <line x1="80" y1="733" x2="1520" y2="733" stroke="#1A1A1A" stroke-width="0.8" opacity="0.18"/>

  <!-- FOOTER -->
  <!-- Handle — prominent, accent color -->
  <text x="80" y="776"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="700" fill="#C94E1A">@teachmebro</text>
  <!-- Author + domain -->
  <text x="80" y="808"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="700" fill="#1A1A1A">Altaf Shaikh</text>
  <text x="80" y="834"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="400" fill="#7A6E58">// AI Engineering</text>
  <!-- Right tagline -->
  <text x="1520" y="808"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17" font-weight="400" fill="#7A6E58" text-anchor="end">the loop that closes itself</text>
  <text x="1520" y="832"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17" font-weight="400" fill="#7A6E58" text-anchor="end">is the one worth using</text>
  <!-- Accent dot pair — bottom right -->
  <circle cx="1528" cy="858" r="9" fill="#C94E1A" opacity="0.88"/>
  <circle cx="1551" cy="858" r="9" fill="#1B57C5" opacity="0.88"/>

</svg>
