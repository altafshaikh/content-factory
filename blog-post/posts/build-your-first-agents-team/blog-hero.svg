<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4efe4"/>
      <stop offset="100%" stop-color="#efe9dc"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="url(#bgGrad)"/>

  <!-- subtle decorative constellation, top right -->
  <g stroke="#c9c1b0" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M1150 80 L1270 170 L1350 110 L1440 220"/>
  </g>
  <circle cx="1150" cy="80" r="5" fill="#cc5500"/>
  <circle cx="1270" cy="170" r="4" fill="#8a8a8a"/>
  <circle cx="1350" cy="110" r="4" fill="#1b6fd1"/>
  <circle cx="1440" cy="220" r="4" fill="#8a8a8a"/>
  <circle cx="1500" cy="170" r="6" fill="#cc5500"/>
  <circle cx="1524" cy="170" r="6" fill="#1b6fd1"/>

  <!-- top label -->
  <text x="90" y="78" font-family="SFMono-Regular, Menlo, Monaco, monospace" font-size="20" font-weight="700" letter-spacing="5" fill="#8a8a8a">&#8212; PROMPTING VS. AGENT SYSTEMS</text>

  <!-- headline: 4 alternating lines -->
  <text x="88" y="185" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="86" font-weight="900" fill="#221f1a">One Prompt,</text>
  <text x="88" y="285" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="86" font-weight="900" fill="#cc5500">Four Jobs.</text>
  <text x="88" y="385" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="86" font-weight="900" fill="#221f1a">Three Agents,</text>
  <text x="88" y="485" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="86" font-weight="900" fill="#1b6fd1">One Job Each.</text>

  <!-- subheadline with accent bar -->
  <rect x="90" y="522" width="6" height="64" fill="#cc5500"/>
  <text x="118" y="550" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600" fill="#221f1a">
    One prompt can&#8217;t <tspan fill="#cc5500" font-weight="700">write</tspan>, <tspan fill="#1b6fd1" font-weight="700">edit</tspan>, and design at once.
  </text>
  <text x="118" y="582" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600" fill="#221f1a">Split the job. Each agent does one thing well.</text>

  <!-- stats row -->
  <text x="90" y="650" font-family="SFMono-Regular, Menlo, Monaco, monospace" font-size="46" font-weight="800" fill="#cc5500">1 prompt</text>
  <text x="90" y="676" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#6b6b6b">juggling 4 jobs at once</text>

  <line x1="430" y1="608" x2="430" y2="682" stroke="#c9c1b0" stroke-width="1.5"/>

  <text x="470" y="650" font-family="SFMono-Regular, Menlo, Monaco, monospace" font-size="46" font-weight="800" fill="#1b6fd1">3 agents</text>
  <text x="470" y="676" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#6b6b6b">1 focused job each</text>

  <!-- horizontal rule -->
  <line x1="90" y1="712" x2="1510" y2="712" stroke="#d9d2c2" stroke-width="1.5"/>

  <!-- byline -->
  <text x="90" y="748" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="800" fill="#221f1a">Altaf Shaikh</text>
  <text x="90" y="774" font-family="SFMono-Regular, Menlo, Monaco, monospace" font-size="17" fill="#8a8a8a">// AI Engineering</text>

  <!-- tagline + handle -->
  <text x="1510" y="742" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#6b6b6b">Prompting finishes work. A system solves a problem.</text>
  <text x="1510" y="774" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800" fill="#cc5500">@teachmebro</text>
</svg>
