<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4efe4"/>
      <stop offset="100%" stop-color="#ede6d8"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bgGrad)"/>

  <!-- faint node network, upper right -->
  <g stroke="#c9c1b0" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M1120 230 L1240 160 L1300 320 L1400 90"/>
    <path d="M1240 160 L1480 210"/>
    <path d="M1300 320 L1350 420"/>
  </g>
  <circle cx="1120" cy="230" r="6" fill="#e2622d"/>
  <circle cx="1240" cy="160" r="4" fill="#c9c1b0"/>
  <circle cx="1300" cy="320" r="6" fill="#1f6fb2"/>
  <circle cx="1400" cy="90" r="4" fill="#c9c1b0"/>
  <circle cx="1480" cy="210" r="4" fill="#c9c1b0"/>
  <circle cx="1350" cy="420" r="4" fill="#c9c1b0"/>

  <!-- top label -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <line x1="96" y1="140" x2="140" y2="140" stroke="#8a8272" stroke-width="3"/>
    <text x="156" y="147" font-size="24" font-weight="700" letter-spacing="6" fill="#6b6455">MULTI-AGENT AI, THE HARD WAY</text>
  </g>

  <!-- headline -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="900">
    <text x="90" y="290" font-size="112" fill="#1a1a1a">Reading About It.</text>
    <text x="90" y="410" font-size="112" fill="#e2622d">Running It.</text>
  </g>

  <!-- sub-statement -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="600">
    <rect x="96" y="470" width="6" height="82" fill="#e2622d"/>
    <text x="130" y="502" fill="#1a1a1a">Multi-agent AI isn&#8217;t a <tspan fill="#e2622d">diagram</tspan> to study.</text>
    <text x="130" y="546" fill="#1a1a1a">It&#8217;s a system you&#8217;re allowed to <tspan fill="#1f6fb2">break</tspan>.</text>
  </g>

  <!-- contrast pair -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="96" y="660" font-size="56" font-weight="700" fill="#e2622d" font-family="Menlo, Consolas, monospace">1 origin point</text>
    <text x="96" y="694" font-size="24" font-weight="400" fill="#6b6455">kicks off the run</text>

    <line x1="660" y1="600" x2="660" y2="700" stroke="#c9c1b0" stroke-width="1.5"/>

    <text x="712" y="660" font-size="56" font-weight="700" fill="#e2622d" font-family="Menlo, Consolas, monospace">4 spawned agents</text>
    <text x="712" y="694" font-size="24" font-weight="400" fill="#6b6455">each its own CLI instance</text>
  </g>

  <!-- divider -->
  <line x1="96" y1="758" x2="1504" y2="758" stroke="#c9c1b0" stroke-width="1"/>

  <!-- footer -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="96" y="806" font-size="30" font-weight="700" fill="#1a1a1a">Altaf Shaikh</text>
    <text x="96" y="834" font-size="20" font-weight="400" fill="#6b6455">// AI Engineering</text>

    <text x="1504" y="794" font-size="20" font-weight="400" fill="#6b6455" text-anchor="end">I didn&#8217;t read the tutorial. I broke the project.</text>
    <text x="1504" y="826" font-size="30" font-weight="800" fill="#e2622d" text-anchor="end">@teachmebro</text>
  </g>
</svg>
