<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="22%"  stop-color="#a855f7" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#ec4899" stop-opacity="0.7"/>
      <stop offset="78%"  stop-color="#f97316" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowBlur" x="-60%" y="-400%" width="220%" height="900%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="1080" height="1080" fill="#ffffff"/>

  <!-- Category label -->
  <text x="540" y="94"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="700" letter-spacing="7"
        fill="#c4b5fd">AI ENGINEERING</text>

  <!-- Hero text: Can't -->
  <text x="540" y="352"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="218" font-weight="900" letter-spacing="-5"
        fill="#111111">Can&#8217;t</text>

  <!-- Hero text: think. -->
  <text x="540" y="578"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="218" font-weight="900" letter-spacing="-5"
        fill="#111111">think.</text>

  <!-- Gradient glow stripe -->
  <rect x="140" y="608" width="800" height="24" rx="12"
        fill="url(#glowGrad)" filter="url(#glowBlur)"/>

  <!-- Supporting contrast text -->
  <text x="540" y="730"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="36" font-weight="700"
        fill="#111111">Scripts follow rules.</text>

  <text x="540" y="782"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="36" font-weight="700"
        fill="#111111"><tspan fill="#7c3aed">Agents</tspan> reason.</text>

  <!-- Thin separator -->
  <line x1="438" y1="844" x2="642" y2="844" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Tagline -->
  <text x="540" y="904"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="400"
        fill="#6b7280">Your AI doesn&#8217;t sleep.</text>

  <!-- Handle -->
  <text x="540" y="990"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30" font-weight="700"
        fill="#7c3aed">@teachmebro</text>

  <!-- Author byline -->
  <text x="540" y="1030"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="400"
        fill="#9ca3af">Altaf Shaikh &#183; AI Engineering</text>
</svg>
