<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.2" fill="#c8bfad" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Cream background -->
  <rect width="1080" height="1350" fill="#f5f0e8"/>

  <!-- Subtle dot grid texture -->
  <rect width="1080" height="1350" fill="url(#dotGrid)"/>

  <!-- Sparkle decorations (4-point stars) -->
  <g fill="#d4522a" opacity="0.8">
    <!-- Top-right sparkle -->
    <polygon points="1020,50 1023,43 1026,50 1033,53 1026,56 1023,63 1020,56 1013,53" transform="scale(0.9)"/>
    <!-- Left mid sparkle -->
    <polygon points="40,420 43,413 46,420 53,423 46,426 43,433 40,426 33,423" transform="scale(0.7)"/>
    <!-- Bottom-right sparkle -->
    <polygon points="1020,1290 1023,1283 1026,1290 1033,1293 1026,1296 1023,1303 1020,1296 1013,1293" transform="scale(0.8)"/>
  </g>

  <!-- Category label: asterisk + small caps -->
  <text x="80" y="66"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="15" font-weight="700" letter-spacing="4"
        fill="#d4522a">&#42; CLAUDE ROUTINES</text>

  <!-- Left column headline -->
  <!-- "Your AI" -->
  <text x="80" y="214"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="88" font-weight="900" letter-spacing="-2"
        fill="#111111">Your AI</text>

  <!-- "doesn't" -->
  <text x="80" y="318"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="88" font-weight="900" letter-spacing="-2"
        fill="#111111">doesn&#8217;t</text>

  <!-- "sleep." in coral -->
  <text x="80" y="422"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="88" font-weight="900" letter-spacing="-2"
        fill="#d4522a">sleep.</text>

  <!-- Subtitle lines -->
  <text x="80" y="490"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400"
        fill="#6b7280">Runs on a schedule.</text>
  <text x="80" y="520"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400"
        fill="#6b7280">Not on your laptop.</text>

  <!-- Scripts vs Agents contrast lines -->
  <text x="80" y="576"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="19" font-weight="700"
        fill="#9ca3af">Scripts: follow rules, break on edge cases</text>
  <text x="80" y="602"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="19" font-weight="700"
        fill="#7c3aed">Agents: reason through them</text>

  <!-- Right column: Terminal window frame -->
  <rect x="558" y="84" width="434" height="532" rx="13" fill="#1c1c1e"/>

  <!-- Title bar overlay (rounded top only) -->
  <rect x="558" y="84" width="434" height="40" rx="13" fill="#2c2c2e"/>
  <!-- Square the bottom corners of title bar -->
  <rect x="558" y="110" width="434" height="14" fill="#2c2c2e"/>

  <!-- Traffic lights -->
  <circle cx="582" cy="104" r="6" fill="#ff5f57"/>
  <circle cx="600" cy="104" r="6" fill="#febc2e"/>
  <circle cx="618" cy="104" r="6" fill="#28c840"/>

  <!-- Terminal path label -->
  <text x="775" y="109" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="12" fill="#6b7280">.claude/routines &#183; nightly-triage</text>

  <!-- Terminal content — config section -->
  <text x="578" y="154"
        font-family="'Courier New', Courier, monospace"
        font-size="14" fill="#6272a4">name: <tspan fill="#facc15">nightly-triage</tspan></text>
  <text x="578" y="178"
        font-family="'Courier New', Courier, monospace"
        font-size="14" fill="#6272a4">schedule: <tspan fill="#facc15">0 0 * * *</tspan></text>
  <text x="578" y="202"
        font-family="'Courier New', Courier, monospace"
        font-size="14" fill="#6272a4">cloud: <tspan fill="#4ade80">true</tspan></text>

  <!-- Terminal blank gap -->

  <!-- Terminal execution log -->
  <text x="578" y="242"
        font-family="'Courier New', Courier, monospace"
        font-size="14" fill="#94a3b8">$ <tspan fill="#e2e8f0">routine start</tspan></text>
  <text x="578" y="266"
        font-family="'Courier New', Courier, monospace"
        font-size="14" fill="#4ade80">&#x2713; cloud agent: ready</text>
  <text x="578" y="290"
        font-family="'Courier New', Courier, monospace"
        font-size="14" fill="#94a3b8">&#x2192; scanning issues...</text>
  <text x="578" y="314"
        font-family="'Courier New', Courier, monospace"
        font-size="14" fill="#94a3b8">  PR queue: 8 pending</text>
  <text x="578" y="338"
        font-family="'Courier New', Courier, monospace"
        font-size="14" fill="#facc15">  edge case: detected</text>
  <text x="578" y="362"
        font-family="'Courier New', Courier, monospace"
        font-size="14" fill="#a78bfa">  reasoning...</text>
  <text x="578" y="386"
        font-family="'Courier New', Courier, monospace"
        font-size="14" fill="#4ade80">&#x2713; adapted + continued</text>
  <text x="578" y="410"
        font-family="'Courier New', Courier, monospace"
        font-size="14" fill="#4ade80">&#x2713; nightly deploy: done</text>

  <!-- blank -->

  <text x="578" y="450"
        font-family="'Courier New', Courier, monospace"
        font-size="14" fill="#4b5563">not on your machine.</text>
  <text x="578" y="474"
        font-family="'Courier New', Courier, monospace"
        font-size="14" fill="#4b5563">runs while you sleep.</text>

  <!-- Cursor blink line -->
  <text x="578" y="510"
        font-family="'Courier New', Courier, monospace"
        font-size="14" fill="#94a3b8">$ <tspan fill="#4ade80">&#9646;</tspan></text>

  <!-- Section separator -->
  <line x1="80" y1="648" x2="1000" y2="648" stroke="#d6cec0" stroke-width="1"/>

  <!-- Three routine cards -->
  <!-- Card 1: Morning -->
  <rect x="80" y="668" width="267" height="150" rx="12" fill="#ede7d9"/>
  <rect x="80" y="668" width="267" height="150" rx="12" fill="none" stroke="#c8bfad" stroke-width="1"/>
  <text x="96" y="700"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12" font-weight="700" letter-spacing="4"
        fill="#d4522a">MORNING</text>
  <text x="96" y="742"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="900"
        fill="#111111">Standup</text>
  <text x="96" y="770"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="900"
        fill="#111111">prep</text>
  <text x="96" y="800"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16" font-weight="400"
        fill="#9ca3af">before your first coffee</text>

  <!-- Card 2: Midday -->
  <rect x="367" y="668" width="267" height="150" rx="12" fill="#ede7d9"/>
  <rect x="367" y="668" width="267" height="150" rx="12" fill="none" stroke="#c8bfad" stroke-width="1"/>
  <text x="383" y="700"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12" font-weight="700" letter-spacing="4"
        fill="#d4522a">MIDDAY</text>
  <text x="383" y="742"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="900"
        fill="#111111">Deploy</text>
  <text x="383" y="770"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="900"
        fill="#111111">check</text>
  <text x="383" y="800"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16" font-weight="400"
        fill="#9ca3af">while you&#8217;re heads-down</text>

  <!-- Card 3: Nightly -->
  <rect x="654" y="668" width="267" height="150" rx="12" fill="#ede7d9"/>
  <rect x="654" y="668" width="267" height="150" rx="12" fill="none" stroke="#c8bfad" stroke-width="1"/>
  <text x="670" y="700"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="12" font-weight="700" letter-spacing="4"
        fill="#d4522a">NIGHTLY</text>
  <text x="670" y="742"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="900"
        fill="#111111">Issue</text>
  <text x="670" y="770"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="900"
        fill="#111111">triage</text>
  <text x="670" y="800"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16" font-weight="400"
        fill="#9ca3af">while you sleep</text>

  <!-- Tag pills row -->
  <!-- Pill 1: 24/7 -->
  <rect x="196" y="848" width="90" height="34" rx="17" fill="none" stroke="#4ade80" stroke-width="1.5"/>
  <text x="241" y="870" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="15" font-weight="600" fill="#4ade80">24/7</text>

  <!-- Pill 2: cloud-scheduled -->
  <rect x="304" y="848" width="180" height="34" rx="17" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="394" y="870" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="15" font-weight="600" fill="#a78bfa">cloud-scheduled</text>

  <!-- Pill 3: reasoning agent -->
  <rect x="502" y="848" width="172" height="34" rx="17" fill="none" stroke="#facc15" stroke-width="1.5"/>
  <text x="588" y="870" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="15" font-weight="600" fill="#b45309">reasoning agent</text>

  <!-- Footer section -->
  <!-- Handle -->
  <text x="540" y="972" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="38" font-weight="700"
        fill="#7c3aed">@teachmebro</text>

  <!-- Thin separator above footer -->
  <line x1="300" y1="1004" x2="780" y2="1004" stroke="#c8bfad" stroke-width="1"/>

  <!-- Tagline in footer -->
  <text x="540" y="1060" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="400"
        fill="#6b7280">Your AI doesn&#8217;t sleep.</text>

  <!-- Author byline -->
  <text x="540" y="1110" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="400"
        fill="#9ca3af">Altaf Shaikh &#183; AI Engineering</text>
</svg>
