<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2538"/>
      <stop offset="100%" stop-color="#141e2d"/>
    </linearGradient>
    <radialGradient id="heroGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg)"/>

  <!-- Hero glow -->
  <ellipse cx="540" cy="330" rx="440" ry="200" fill="url(#heroGlow)"/>

  <!-- Top accent line -->
  <rect x="80" y="80" width="920" height="4" rx="2" fill="url(#accent)"/>

  <!-- Category label -->
  <text x="80" y="154"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="700" letter-spacing="8" fill="#22d3ee">AI ENGINEERING</text>

  <!-- Hero number -->
  <text x="540" y="408"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="260" font-weight="900" text-anchor="middle" fill="url(#accent)">0</text>

  <!-- Hero sub-label -->
  <text x="540" y="472"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="38" font-weight="300" text-anchor="middle" fill="#cbd5e1" letter-spacing="1">human interventions</text>

  <!-- Hero secondary label -->
  <text x="540" y="514"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" text-anchor="middle" fill="#64748b" letter-spacing="2">across 4 ticks of autonomous work</text>

  <!-- Section divider -->
  <rect x="80" y="548" width="920" height="1" fill="#ffffff" fill-opacity="0.1"/>

  <!-- Tile 1: INPUT -->
  <rect x="80" y="568" width="293" height="282" rx="16" fill="url(#tile)"/>
  <rect x="80" y="568" width="293" height="4" rx="2" fill="url(#accent)"/>
  <text x="226" y="690"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="80" font-weight="900" text-anchor="middle" fill="url(#accent)">1</text>
  <text x="226" y="742"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" letter-spacing="5" text-anchor="middle" fill="#64748b">INPUT</text>
  <text x="226" y="776"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17" text-anchor="middle" fill="#475569">one PRD, nothing more</text>

  <!-- Tile 2: TICKS -->
  <rect x="393" y="568" width="293" height="282" rx="16" fill="url(#tile)"/>
  <rect x="393" y="568" width="293" height="4" rx="2" fill="url(#accent)"/>
  <text x="539" y="690"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="80" font-weight="900" text-anchor="middle" fill="url(#accent)">4</text>
  <text x="539" y="742"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" letter-spacing="5" text-anchor="middle" fill="#64748b">TICKS</text>
  <text x="539" y="776"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17" text-anchor="middle" fill="#475569">plan &#8594; build &#8594; test &#8594; done</text>

  <!-- Tile 3: OUTPUT -->
  <rect x="706" y="568" width="294" height="282" rx="16" fill="url(#tile)"/>
  <rect x="706" y="568" width="294" height="4" rx="2" fill="url(#accent)"/>
  <text x="853" y="690"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="80" font-weight="900" text-anchor="middle" fill="url(#accent)">1</text>
  <text x="853" y="742"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" letter-spacing="5" text-anchor="middle" fill="#64748b">OUTPUT</text>
  <text x="853" y="776"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17" text-anchor="middle" fill="#475569">working todo app</text>

  <!-- Before/After section -->
  <rect x="80" y="898" width="920" height="1" fill="#ffffff" fill-opacity="0.06"/>

  <!-- OLD ERA -->
  <text x="80" y="924"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" letter-spacing="5" fill="#475569">OLD</text>
  <rect x="210" y="906" width="740" height="22" rx="11" fill="#1e2a3a"/>
  <rect x="210" y="906" width="740" height="22" rx="11" fill="#ef4444" fill-opacity="0.45"/>
  <text x="960" y="924"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="600" text-anchor="end" fill="#ef4444">you write every line</text>

  <!-- NEW ERA -->
  <text x="80" y="970"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" letter-spacing="5" fill="#475569">NEW</text>
  <rect x="210" y="952" width="740" height="22" rx="11" fill="#1e2a3a"/>
  <rect x="210" y="952" width="80" height="22" rx="11" fill="url(#accent)"/>
  <text x="960" y="970"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="600" text-anchor="end" fill="#22d3ee">PRD &#8594; agents &#8594; app</text>

  <!-- Bold statement section -->
  <rect x="80" y="1002" width="920" height="1" fill="#ffffff" fill-opacity="0.06"/>

  <text x="540" y="1050"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="700" text-anchor="middle" fill="#e2e8f0">&#8220;Deploy your first agent team&#8221;</text>
  <text x="540" y="1094"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="700" text-anchor="middle" fill="url(#accent)">is the new Hello World.</text>

  <!-- Footer divider -->
  <rect x="80" y="1140" width="920" height="1" fill="#ffffff" fill-opacity="0.1"/>

  <!-- Tagline -->
  <text x="540" y="1196"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="300" text-anchor="middle" fill="#94a3b8" letter-spacing="2">&#8220;I just gave it the PRD.&#8221;</text>

  <!-- Handle -->
  <text x="540" y="1244"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="700" text-anchor="middle" fill="#22d3ee">@teachmebro</text>

  <!-- Byline -->
  <text x="540" y="1285"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="600" text-anchor="middle" fill="#475569">Altaf Shaikh &#183; AI Engineering</text>
</svg>
