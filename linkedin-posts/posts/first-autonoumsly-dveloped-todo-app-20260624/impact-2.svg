<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background: warm cream -->
  <rect width="1080" height="1080" fill="#f5f0e8"/>

  <!-- Subtle glow at base of headline -->
  <ellipse cx="430" cy="420" rx="320" ry="32" fill="#7c3aed" fill-opacity="0.12" filter="url(#glow)"/>

  <!-- Category label -->
  <text x="80" y="105"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="400" letter-spacing="4" fill="#9ca3af">&#8212; AI ENGINEERING</text>

  <!-- Giant headline line 1 -->
  <text x="80" y="258"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="118" font-weight="900" fill="#1a1a1a">Same feeling.</text>

  <!-- Giant headline line 2 -->
  <text x="80" y="390"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="118" font-weight="900" fill="#6d28d9">Different era.</text>

  <!-- Vertical accent bar for quote -->
  <rect x="80" y="434" width="6" height="118" rx="3" fill="#6d28d9"/>

  <!-- Quote lines -->
  <text x="106" y="470"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="700" fill="#1a1a1a">The Hello World moment for AI engineering</text>
  <text x="106" y="506"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="400" fill="#374151">isn&#8217;t a line you type.</text>
  <text x="106" y="542"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="400" fill="#374151">It&#8217;s a PRD you hand off.</text>

  <!-- Section rule -->
  <rect x="80" y="576" width="920" height="1" fill="#c4b9ac"/>

  <!-- Vertical stat divider -->
  <rect x="540" y="588" width="1" height="100" fill="#c4b9ac"/>

  <!-- Left stat: 1 PRD -->
  <text x="310" y="650"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="68" font-weight="900" text-anchor="middle" fill="#6d28d9">1 PRD</text>
  <text x="310" y="686"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="400" letter-spacing="2" text-anchor="middle" fill="#6b7280">input to agent team</text>

  <!-- Right stat: 4 ticks -->
  <text x="770" y="650"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="68" font-weight="900" text-anchor="middle" fill="#6d28d9">4 ticks</text>
  <text x="770" y="686"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="400" letter-spacing="2" text-anchor="middle" fill="#6b7280">0 human interventions</text>

  <!-- Pipeline text -->
  <rect x="80" y="724" width="920" height="1" fill="#c4b9ac"/>

  <text x="540" y="758"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="700" letter-spacing="5" text-anchor="middle" fill="#9ca3af">PLAN &#183; EXECUTE &#183; TEST &#183; MARK COMPLETE</text>
  <text x="540" y="786"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16" font-weight="400" text-anchor="middle" fill="#b0a898">all automated &#183; no human in the loop</text>

  <!-- Footer rule -->
  <rect x="80" y="824" width="920" height="1" fill="#c4b9ac"/>

  <!-- Author -->
  <text x="80" y="870"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="700" fill="#1a1a1a">Altaf Shaikh</text>
  <text x="80" y="904"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="400" fill="#6b7280">// AI Engineering</text>

  <!-- Handle + tagline (right-aligned) -->
  <text x="1000" y="870"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="700" text-anchor="end" fill="#6d28d9">@teachmebro</text>
  <text x="1000" y="904"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="400" text-anchor="end" fill="#6b7280">&#8220;I just gave it the PRD.&#8221;</text>

  <!-- Decorative dots -->
  <circle cx="980" cy="136" r="13" fill="#6d28d9" fill-opacity="0.65"/>
  <circle cx="1008" cy="160" r="8" fill="#6d28d9" fill-opacity="0.30"/>
  <circle cx="958" cy="156" r="5" fill="#6d28d9" fill-opacity="0.20"/>
</svg>
