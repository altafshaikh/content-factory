<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf7f2"/>
      <stop offset="100%" stop-color="#f2ede4"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <!-- Pastel bubble fills -->
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg2)"/>

  <!-- Left column: big headline -->
  <!-- Accent bar under headline word -->
  <rect x="60" y="148" width="340" height="10" rx="5" fill="#fbbf24" opacity="0.6"/>

  <text x="60" y="142" text-anchor="start" font-size="70" font-weight="900" fill="#111827" letter-spacing="-2">Stop</text>
  <text x="60" y="230" text-anchor="start" font-size="70" font-weight="900" fill="#111827" letter-spacing="-2">prompting.</text>

  <!-- Orange underline accent under "prompting." -->
  <rect x="60" y="240" width="370" height="8" rx="4" fill="#f97316" opacity="0.7"/>

  <text x="60" y="308" text-anchor="start" font-size="58" font-weight="900" fill="#6366f1" letter-spacing="-1">Start building</text>
  <text x="60" y="378" text-anchor="start" font-size="58" font-weight="900" fill="#6366f1" letter-spacing="-1">systems.</text>

  <!-- Subtitle -->
  <text x="60" y="432" text-anchor="start" font-size="22" font-weight="400" fill="#6b7280">Three roles. One goal.</text>
  <text x="60" y="460" text-anchor="start" font-size="22" font-weight="400" fill="#6b7280">Agents pass work between them.</text>

  <!-- Divider -->
  <line x1="60" y1="490" x2="460" y2="490" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Bottom-left: the two contrast lines -->
  <text x="60" y="532" text-anchor="start" font-size="18" font-weight="700" fill="#ef4444">Prompting:</text>
  <text x="60" y="556" text-anchor="start" font-size="18" font-weight="400" fill="#374151">1 model &#183; 1 task &#183; done</text>

  <text x="60" y="596" text-anchor="start" font-size="18" font-weight="700" fill="#16a34a">Agent system:</text>
  <text x="60" y="620" text-anchor="start" font-size="18" font-weight="400" fill="#374151">3 agents &#183; 1 goal &#183; problem solved</text>

  <!-- Right column: illustrated diagram -->
  <!-- Outer circle container hint — light card bg -->
  <rect x="520" y="80" width="510" height="820" rx="32" fill="white" opacity="0.7"/>

  <!-- Title of diagram -->
  <text x="775" y="132" text-anchor="middle" font-size="20" font-weight="800" fill="#374151" letter-spacing="2">THE PATTERN</text>
  <line x1="600" y1="145" x2="950" y2="145" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Agent 1 bubble: Understand -->
  <circle cx="775" cy="265" r="88" fill="#e0e7ff" stroke="#818cf8" stroke-width="3"/>
  <text x="775" y="252" text-anchor="middle" font-size="15" font-weight="800" fill="#3730a3" letter-spacing="1">AGENT 1</text>
  <text x="775" y="278" text-anchor="middle" font-size="26" font-weight="900" fill="#4338ca">Understand</text>
  <text x="775" y="302" text-anchor="middle" font-size="14" font-weight="400" fill="#4338ca">Read the input</text>

  <!-- Arrow 1→2 -->
  <line x1="775" y1="353" x2="775" y2="403" stroke="#a78bfa" stroke-width="3" stroke-dasharray="6,4"/>
  <polygon points="775,410 767,393 783,393" fill="#a78bfa"/>
  <rect x="686" y="365" width="178" height="28" rx="14" fill="#ede9fe"/>
  <text x="775" y="383" text-anchor="middle" font-size="13" font-weight="600" fill="#7c3aed">hands off work</text>

  <!-- Agent 2 bubble: Do -->
  <circle cx="775" cy="510" r="88" fill="#fce7f3" stroke="#f472b6" stroke-width="3"/>
  <text x="775" y="497" text-anchor="middle" font-size="15" font-weight="800" fill="#9d174d" letter-spacing="1">AGENT 2</text>
  <text x="775" y="523" text-anchor="middle" font-size="26" font-weight="900" fill="#be185d">Do</text>
  <text x="775" y="547" text-anchor="middle" font-size="14" font-weight="400" fill="#be185d">Execute the work</text>

  <!-- Arrow 2→3 -->
  <line x1="775" y1="598" x2="775" y2="648" stroke="#a78bfa" stroke-width="3" stroke-dasharray="6,4"/>
  <polygon points="775,655 767,638 783,638" fill="#a78bfa"/>
  <rect x="686" y="610" width="178" height="28" rx="14" fill="#ede9fe"/>
  <text x="775" y="628" text-anchor="middle" font-size="13" font-weight="600" fill="#7c3aed">hands off work</text>

  <!-- Agent 3 bubble: Review -->
  <circle cx="775" cy="755" r="88" fill="#d1fae5" stroke="#34d399" stroke-width="3"/>
  <text x="775" y="742" text-anchor="middle" font-size="15" font-weight="800" fill="#065f46" letter-spacing="1">AGENT 3</text>
  <text x="775" y="768" text-anchor="middle" font-size="26" font-weight="900" fill="#059669">Review</text>
  <text x="775" y="792" text-anchor="middle" font-size="14" font-weight="400" fill="#059669">Output the verdict</text>

  <!-- Small label on right of diagram: "Shared goal" -->
  <rect x="870" y="480" width="120" height="60" rx="12" fill="#fef9c3" stroke="#fde047" stroke-width="1.5"/>
  <text x="930" y="506" text-anchor="middle" font-size="12" font-weight="700" fill="#854d0e">Shared</text>
  <text x="930" y="524" text-anchor="middle" font-size="12" font-weight="700" fill="#854d0e">goal</text>
  <!-- dotted line from shared goal to agent 2 -->
  <line x1="870" y1="510" x2="863" y2="510" stroke="#fde047" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Footer area -->
  <line x1="60" y1="672" x2="460" y2="672" stroke="#e5e7eb" stroke-width="1"/>

  <!-- CTA note -->
  <text x="60" y="712" text-anchor="start" font-size="17" font-weight="400" fill="#6b7280">Full walkthrough &#8594; link in comments</text>

  <!-- Bottom bar -->
  <rect x="0" y="970" width="1080" height="110" rx="0" fill="#111827"/>
  <rect x="0" y="970" width="1080" height="5" fill="url(#accentLine)"/>
  <text x="540" y="1022" text-anchor="middle" font-size="32" font-weight="800" fill="#a78bfa">@teachmebro</text>
  <text x="540" y="1056" text-anchor="middle" font-size="18" font-weight="400" fill="#94a3b8">Altaf Shaikh &#183; AI Engineering</text>
</svg>
