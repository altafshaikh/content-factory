<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <!-- Cyan-to-violet accent gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Hero text gradient -->
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="60%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Tile background -->
    <linearGradient id="tileBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2433"/>
      <stop offset="100%" stop-color="#161c2e"/>
    </linearGradient>

    <!-- Arrow gradient -->
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for hero -->
    <filter id="heroGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg)"/>

  <!-- Subtle grid overlay -->
  <g opacity="0.04" stroke="#22d3ee" stroke-width="1" fill="none">
    <line x1="0" y1="270" x2="1080" y2="270"/>
    <line x1="0" y1="540" x2="1080" y2="540"/>
    <line x1="0" y1="810" x2="1080" y2="810"/>
    <line x1="0" y1="1080" x2="1080" y2="1080"/>
    <line x1="270" y1="0" x2="270" y2="1350"/>
    <line x1="540" y1="0" x2="540" y2="1350"/>
    <line x1="810" y1="0" x2="810" y2="1350"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1080" height="5" fill="url(#accent)"/>

  <!-- Top label -->
  <text x="540" y="80" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="22" fill="#22d3ee" text-anchor="middle" letter-spacing="6" opacity="0.8">CLAUDE CODE · FEATURE DROP</text>

  <!-- Decorative horizontal rule -->
  <line x1="80" y1="100" x2="1000" y2="100" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>

  <!-- Hero command text -->
  <text x="540" y="280" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="200" font-weight="bold" fill="url(#heroGrad)" text-anchor="middle" filter="url(#heroGlow)" letter-spacing="-4">/loop</text>

  <!-- Hero subtitle -->
  <text x="540" y="350" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="32" fill="#94a3b8" text-anchor="middle" letter-spacing="1">Run any command on a recurring interval</text>

  <!-- Decorative rule below hero -->
  <line x1="200" y1="385" x2="880" y2="385" stroke="url(#accent)" stroke-width="1" opacity="0.25"/>

  <!-- Three concept tiles -->
  <!-- Tile 1: ONE COMMAND -->
  <rect x="60" y="420" width="290" height="220" rx="16" fill="url(#tileBg)" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3"/>
  <text x="205" y="490" font-family="'SF Mono', 'Fira Code', monospace" font-size="52" fill="#22d3ee" text-anchor="middle" font-weight="bold" filter="url(#glow)">/loop</text>
  <line x1="85" y1="510" x2="325" y2="510" stroke="#22d3ee" stroke-width="1" opacity="0.2"/>
  <text x="205" y="555" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#e2e8f0" text-anchor="middle" font-weight="600" letter-spacing="3">ONE COMMAND</text>
  <text x="205" y="590" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">no glue code needed</text>
  <text x="205" y="618" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">no extra infra</text>

  <!-- Arrow 1 -->
  <g opacity="0.6">
    <line x1="365" y1="530" x2="410" y2="530" stroke="url(#arrowGrad)" stroke-width="2"/>
    <polygon points="410,523 425,530 410,537" fill="#a78bfa" opacity="0.7"/>
  </g>

  <!-- Tile 2: RECURRING -->
  <rect x="395" y="420" width="290" height="220" rx="16" fill="url(#tileBg)" stroke="#818cf8" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Loop icon (circular arrow suggestion via arcs) -->
  <circle cx="540" cy="483" r="26" fill="none" stroke="url(#accent)" stroke-width="3" stroke-dasharray="130 30"/>
  <polygon points="556,465 566,477 554,480" fill="#a78bfa"/>
  <line x1="420" y1="510" x2="660" y2="510" stroke="#818cf8" stroke-width="1" opacity="0.2"/>
  <text x="540" y="555" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#e2e8f0" text-anchor="middle" font-weight="600" letter-spacing="3">RECURRING</text>
  <text x="540" y="590" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">prompt or slash command</text>
  <text x="540" y="618" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">runs on your schedule</text>

  <!-- Arrow 2 -->
  <g opacity="0.6">
    <line x1="700" y1="530" x2="745" y2="530" stroke="url(#arrowGrad)" stroke-width="2"/>
    <polygon points="745,523 760,530 745,537" fill="#a78bfa" opacity="0.7"/>
  </g>

  <!-- Tile 3: LIVE EXPERIMENT -->
  <rect x="730" y="420" width="290" height="220" rx="16" fill="url(#tileBg)" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Pulsing dot indicator -->
  <circle cx="875" cy="468" r="10" fill="#22d3ee" opacity="0.2"/>
  <circle cx="875" cy="468" r="6" fill="#22d3ee" opacity="0.5"/>
  <circle cx="875" cy="468" r="3" fill="#22d3ee"/>
  <line x1="755" y1="510" x2="995" y2="510" stroke="#a78bfa" stroke-width="1" opacity="0.2"/>
  <text x="875" y="555" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#e2e8f0" text-anchor="middle" font-weight="600" letter-spacing="3">LIVE NOW</text>
  <text x="875" y="590" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">content pipeline</text>
  <text x="875" y="618" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">running as we speak</text>

  <!-- Mental model section -->
  <rect x="60" y="680" width="960" height="180" rx="16" fill="#0d1120" stroke="none"/>
  <rect x="60" y="680" width="6" height="180" rx="3" fill="url(#accent)"/>

  <text x="110" y="740" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#64748b" letter-spacing="2">THE SHIFT</text>
  <text x="110" y="790" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="36" fill="#94a3b8" font-weight="300">tools you <tspan fill="#f87171" font-weight="600">invoke</tspan></text>
  <text x="110" y="840" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="36" fill="#94a3b8" font-weight="300">vs processes that <tspan fill="#22d3ee" font-weight="600">run</tspan></text>

  <!-- Divider -->
  <line x1="60" y1="900" x2="1020" y2="900" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>

  <!-- Tagline -->
  <text x="540" y="990" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" fill="#f1f5f9" text-anchor="middle" letter-spacing="-1">Set it.</text>
  <text x="540" y="1080" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" fill="url(#heroGrad)" text-anchor="middle" letter-spacing="-1">Let it run.</text>

  <!-- Divider -->
  <line x1="60" y1="1130" x2="1020" y2="1130" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>

  <!-- Byline -->
  <text x="540" y="1220" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="24" fill="#475569" text-anchor="middle" letter-spacing="1">Built by Altaf</text>
  <text x="540" y="1260" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#334155" text-anchor="middle" letter-spacing="2">AI ENGINEERING</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="1345" width="1080" height="5" fill="url(#accent)"/>
</svg>
