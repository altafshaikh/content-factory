<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2538"/>
      <stop offset="100%" stop-color="#141e2d"/>
    </linearGradient>
    <linearGradient id="tileRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1a2e"/>
      <stop offset="100%" stop-color="#16121f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <ellipse cx="540" cy="300" rx="480" ry="200" fill="url(#glow)"/>

  <!-- Top accent line -->
  <rect x="80" y="72" width="920" height="4" rx="2" fill="url(#accent)"/>

  <!-- Category label -->
  <text x="80" y="138" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="700" letter-spacing="7" fill="#22d3ee">AI ENGINEERING</text>

  <!-- Hero statement -->
  <text x="540" y="228" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="42" font-weight="900" text-anchor="middle" fill="#f1f5f9">The hidden cost of</text>
  <text x="540" y="284" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="42" font-weight="900" text-anchor="middle" fill="url(#accent)">AI agents</text>

  <!-- Divider -->
  <rect x="80" y="316" width="920" height="1" fill="#ffffff" fill-opacity="0.08"/>

  <!-- Column headers -->
  <!-- Left tile header -->
  <rect x="80" y="340" width="435" height="54" rx="8" fill="#0f1f35"/>
  <text x="297" y="374" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="700" letter-spacing="5" text-anchor="middle" fill="#22d3ee">TRADITIONAL CODE</text>

  <!-- Right tile header -->
  <rect x="565" y="340" width="435" height="54" rx="8" fill="#1a0f2e"/>
  <text x="782" y="374" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="700" letter-spacing="5" text-anchor="middle" fill="#a78bfa">AI AGENTS</text>

  <!-- VS divider center -->
  <text x="540" y="375" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="14" font-weight="900" text-anchor="middle" fill="#475569">VS</text>

  <!-- Row 1 — Input/Output -->
  <rect x="80" y="416" width="435" height="100" rx="14" fill="url(#tile)"/>
  <rect x="80" y="416" width="435" height="4" rx="2" fill="#22d3ee" fill-opacity="0.6"/>
  <text x="297" y="458" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="900" text-anchor="middle" fill="#22d3ee">Same input</text>
  <text x="297" y="494" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="700" text-anchor="middle" fill="#94a3b8">Same output. Always.</text>

  <rect x="565" y="416" width="435" height="100" rx="14" fill="url(#tileRight)"/>
  <rect x="565" y="416" width="435" height="4" rx="2" fill="#a78bfa" fill-opacity="0.6"/>
  <text x="782" y="458" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="900" text-anchor="middle" fill="#a78bfa">Same input</text>
  <text x="782" y="494" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="700" text-anchor="middle" fill="#94a3b8">Output: ?</text>

  <!-- Row 2 — Maintenance -->
  <rect x="80" y="534" width="435" height="100" rx="14" fill="url(#tile)"/>
  <rect x="80" y="534" width="435" height="4" rx="2" fill="#22d3ee" fill-opacity="0.6"/>
  <text x="297" y="576" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="900" text-anchor="middle" fill="#22d3ee">Write once.</text>
  <text x="297" y="612" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="700" text-anchor="middle" fill="#94a3b8">Run forever.</text>

  <rect x="565" y="534" width="435" height="100" rx="14" fill="url(#tileRight)"/>
  <rect x="565" y="534" width="435" height="4" rx="2" fill="#a78bfa" fill-opacity="0.6"/>
  <text x="782" y="576" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="900" text-anchor="middle" fill="#a78bfa">Write once.</text>
  <text x="782" y="612" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="700" text-anchor="middle" fill="#94a3b8">Then keep tending it.</text>

  <!-- Row 3 — Vendor risk -->
  <rect x="80" y="652" width="435" height="100" rx="14" fill="url(#tile)"/>
  <rect x="80" y="652" width="435" height="4" rx="2" fill="#22d3ee" fill-opacity="0.6"/>
  <text x="297" y="694" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="900" text-anchor="middle" fill="#22d3ee">You own it.</text>
  <text x="297" y="730" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="700" text-anchor="middle" fill="#94a3b8">Fully. Always.</text>

  <rect x="565" y="652" width="435" height="100" rx="14" fill="url(#tileRight)"/>
  <rect x="565" y="652" width="435" height="4" rx="2" fill="#a78bfa" fill-opacity="0.6"/>
  <text x="782" y="694" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="900" text-anchor="middle" fill="#a78bfa">Vendor updates.</text>
  <text x="782" y="730" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="700" text-anchor="middle" fill="#94a3b8">You adapt.</text>

  <!-- Row 4 — artifact vs system -->
  <rect x="80" y="770" width="435" height="100" rx="14" fill="url(#tile)"/>
  <rect x="80" y="770" width="435" height="4" rx="2" fill="#22d3ee" fill-opacity="0.6"/>
  <text x="297" y="812" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="900" text-anchor="middle" fill="#22d3ee">Stable artifact.</text>
  <text x="297" y="848" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" text-anchor="middle" fill="#64748b">Ship it. Forget it.</text>

  <rect x="565" y="770" width="435" height="100" rx="14" fill="url(#tileRight)"/>
  <rect x="565" y="770" width="435" height="4" rx="2" fill="#a78bfa" fill-opacity="0.6"/>
  <text x="782" y="812" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="900" text-anchor="middle" fill="#a78bfa">Living system.</text>
  <text x="782" y="848" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" text-anchor="middle" fill="#64748b">Ship it. Tend it.</text>

  <!-- Footer divider -->
  <rect x="80" y="910" width="920" height="1" fill="#ffffff" fill-opacity="0.08"/>

  <!-- Tagline -->
  <text x="540" y="966" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="300" text-anchor="middle" fill="#94a3b8" letter-spacing="2">Neither is wrong. But they are not the same.</text>

  <!-- Byline -->
  <text x="540" y="1016" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="600" text-anchor="middle" fill="#475569">Altaf Shaikh  ·  @teachmebro</text>
</svg>
