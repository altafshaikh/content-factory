<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2538"/>
      <stop offset="100%" stop-color="#141e2d"/>
    </linearGradient>
    <radialGradient id="heroGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bg)"/>

  <!-- Hero glow -->
  <ellipse cx="540" cy="360" rx="440" ry="220" fill="url(#heroGlow)"/>

  <!-- Top accent line -->
  <rect x="80" y="80" width="920" height="4" rx="2" fill="url(#accent)"/>

  <!-- Category label -->
  <text x="80" y="154"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="700" letter-spacing="8" fill="#22d3ee">AI ENGINEERING</text>

  <!-- Hero number -->
  <text x="540" y="430"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="260" font-weight="900" text-anchor="middle" fill="url(#accent)">10&#215;</text>

  <!-- Hero sub-label -->
  <text x="540" y="502"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="38" font-weight="300" text-anchor="middle" fill="#cbd5e1" letter-spacing="1">
    faster than the legacy pipeline
  </text>

  <!-- Section divider -->
  <rect x="80" y="570" width="920" height="1" fill="#ffffff" fill-opacity="0.1"/>

  <!-- Stat tiles — 3 cols, tile w=293, gap=20, starts x=80 -->

  <!-- Tile 1 -->
  <rect x="80" y="600" width="293" height="300" rx="16" fill="url(#tile)"/>
  <rect x="80" y="600" width="293" height="4" rx="2" fill="url(#accent)"/>
  <text x="226" y="724"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="74" font-weight="900" text-anchor="middle" fill="url(#accent)">3h</text>
  <text x="226" y="778"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" letter-spacing="5" text-anchor="middle" fill="#64748b">BUILD TIME</text>
  <text x="226" y="814"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" text-anchor="middle" fill="#475569">&#8595; from 30 hrs</text>

  <!-- Tile 2 -->
  <rect x="393" y="600" width="293" height="300" rx="16" fill="url(#tile)"/>
  <rect x="393" y="600" width="293" height="4" rx="2" fill="url(#accent)"/>
  <text x="539" y="724"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="74" font-weight="900" text-anchor="middle" fill="url(#accent)">87%</text>
  <text x="539" y="778"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" letter-spacing="5" text-anchor="middle" fill="#64748b">ACCURACY</text>
  <text x="539" y="814"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" text-anchor="middle" fill="#475569">+34 pts vs baseline</text>

  <!-- Tile 3 -->
  <rect x="706" y="600" width="294" height="300" rx="16" fill="url(#tile)"/>
  <rect x="706" y="600" width="294" height="4" rx="2" fill="url(#accent)"/>
  <text x="853" y="724"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="74" font-weight="900" text-anchor="middle" fill="url(#accent)">1</text>
  <text x="853" y="778"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" letter-spacing="5" text-anchor="middle" fill="#64748b">DEV TEAM</text>
  <text x="853" y="814"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" text-anchor="middle" fill="#475569">end-to-end</text>

  <!-- Before / After section -->
  <rect x="80" y="950" width="920" height="1" fill="#ffffff" fill-opacity="0.06"/>

  <text x="80" y="990"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" letter-spacing="5" fill="#475569">BEFORE</text>
  <!-- Before track -->
  <rect x="210" y="970" width="740" height="22" rx="11" fill="#1e2a3a"/>
  <!-- Before fill (full = 30h baseline) -->
  <rect x="210" y="970" width="740" height="22" rx="11" fill="#ef4444" fill-opacity="0.45"/>
  <text x="960" y="988"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" text-anchor="end" fill="#ef4444">30h</text>

  <text x="80" y="1044"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" letter-spacing="5" fill="#475569">AFTER</text>
  <!-- After track -->
  <rect x="210" y="1024" width="740" height="22" rx="11" fill="#1e2a3a"/>
  <!-- After fill (3h = 10% of 30h = 74px of 740) -->
  <rect x="210" y="1024" width="74" height="22" rx="11" fill="url(#accent)"/>
  <text x="960" y="1042"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" text-anchor="end" fill="#22d3ee">3h</text>

  <!-- Footer divider -->
  <rect x="80" y="1190" width="920" height="1" fill="#ffffff" fill-opacity="0.1"/>

  <!-- Tagline -->
  <text x="540" y="1252"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30" font-weight="300" text-anchor="middle" fill="#94a3b8" letter-spacing="2">
    Build more. Ship faster.
  </text>

  <!-- Byline -->
  <text x="540" y="1300"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="600" text-anchor="middle" fill="#475569">
    Built by Altaf Shaikh  &#183;  AI Engineering
  </text>
</svg>
