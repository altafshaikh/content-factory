<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.15" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#glow)"/>

  <!-- Decorative quotation mark (background) -->
  <text x="60" y="320"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="340" font-weight="700" fill="url(#accent)" fill-opacity="0.1">&#8220;</text>

  <!-- Top accent bar -->
  <rect x="80" y="80" width="180" height="5" rx="3" fill="url(#accent)"/>

  <!-- Label -->
  <text x="80" y="150"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="700" letter-spacing="7" fill="#334155">
    ON BUILDING WITH AI
  </text>

  <!-- Quote line 1 -->
  <text x="80" y="430"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="58" font-weight="700" fill="#f1f5f9" letter-spacing="-1">
    The tool you&#8217;re avoiding
  </text>

  <!-- Quote line 2 -->
  <text x="80" y="504"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="58" font-weight="700" fill="#f1f5f9" letter-spacing="-1">
    is the one that would
  </text>

  <!-- Quote line 3 — gradient accent -->
  <text x="80" y="578"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="58" font-weight="700" fill="url(#accent)" letter-spacing="-1">
    change everything.
  </text>

  <!-- Rule -->
  <rect x="80" y="638" width="920" height="1" fill="#ffffff" fill-opacity="0.1"/>

  <!-- Attribution -->
  <text x="80" y="712"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="32" font-weight="600" fill="#94a3b8">
    Altaf Shaikh
  </text>
  <text x="80" y="754"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="400" fill="#475569">
    AI Engineering  &#183;  @altafshaikh
  </text>

  <!-- Bottom accent -->
  <rect x="80" y="980" width="920" height="3" rx="2" fill="url(#accent)" fill-opacity="0.35"/>
</svg>
