<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="45%" stop-color="#0f0a2e"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBL" cx="0.05" cy="0.95" r="0.45">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTR" cx="0.95" cy="0.05" r="0.4">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glowCenter)"/>
  <rect width="1920" height="1080" fill="url(#glowBL)"/>
  <rect width="1920" height="1080" fill="url(#glowTR)"/>

  <!-- Decorative orbit rings top-right -->
  <circle cx="1760" cy="160" r="320" fill="none" stroke="#a78bfa" stroke-opacity="0.06" stroke-width="1"/>
  <circle cx="1760" cy="160" r="210" fill="none" stroke="#a78bfa" stroke-opacity="0.09" stroke-width="1"/>
  <circle cx="1760" cy="160" r="110" fill="none" stroke="#22d3ee" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Decorative orbit rings bottom-left -->
  <circle cx="180" cy="940" r="240" fill="none" stroke="#22d3ee" stroke-opacity="0.06" stroke-width="1"/>
  <circle cx="180" cy="940" r="140" fill="none" stroke="#22d3ee" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Top accent line -->
  <rect x="140" y="96" width="380" height="3" rx="2" fill="url(#accent)"/>

  <!-- Session label -->
  <text x="140" y="172"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="700" letter-spacing="8" fill="#22d3ee">
    AI ENGINEERING
  </text>

  <!-- Title line 1 -->
  <text x="140" y="420"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="108" font-weight="900" fill="#f8fafc" letter-spacing="-3">
    Building AI Systems
  </text>

  <!-- Title line 2 — gradient -->
  <text x="140" y="546"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="108" font-weight="900" fill="url(#accent)" letter-spacing="-3">
    That Actually Ship
  </text>

  <!-- Subtitle -->
  <text x="140" y="648"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="38" font-weight="300" fill="#94a3b8" letter-spacing="0.5">
    From prototype to production: patterns, pitfalls, and principles
  </text>

  <!-- Horizontal rule -->
  <rect x="140" y="732" width="1640" height="1" fill="#ffffff" fill-opacity="0.08"/>

  <!-- Speaker left -->
  <text x="140" y="808"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="36" font-weight="700" fill="#e2e8f0">
    Altaf Shaikh
  </text>
  <text x="140" y="856"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="400" fill="#64748b">
    Staff Engineer  &#183;  Contentstack
  </text>

  <!-- Event / date right -->
  <text x="1780" y="808"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="400" text-anchor="end" fill="#475569">
    June 2026
  </text>
  <text x="1780" y="850"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" text-anchor="end" fill="#334155">
    AI Engineering Series
  </text>
</svg>
