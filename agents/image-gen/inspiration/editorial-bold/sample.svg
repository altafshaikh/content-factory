<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="55%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glowTR" cx="1" cy="0" r="0.9">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBL" cx="0" cy="1" r="0.7">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glowTR)"/>
  <rect width="1600" height="900" fill="url(#glowBL)"/>

  <!-- Left vertical accent bar -->
  <rect x="100" y="60" width="4" height="780" rx="2" fill="url(#accent)" fill-opacity="0.5"/>

  <!-- Category + series label -->
  <text x="130" y="132"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="700" letter-spacing="8" fill="#22d3ee">
    AI ENGINEERING  &#183;  SERIES
  </text>

  <!-- Hero line 1 -->
  <text x="130" y="360"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="112" font-weight="900" fill="#f1f5f9" letter-spacing="-3">
    The Prompt Is
  </text>

  <!-- Hero line 2 — gradient fill -->
  <text x="130" y="488"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="112" font-weight="900" fill="url(#accent)" letter-spacing="-3">
    Your Architecture
  </text>

  <!-- Accent rule below hero -->
  <rect x="130" y="530" width="560" height="3" rx="2" fill="url(#accent)" fill-opacity="0.7"/>

  <!-- Sub-copy line 1 -->
  <text x="130" y="612"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="32" font-weight="300" fill="#94a3b8" letter-spacing="0.5">
    Why the way you write prompts defines your system&#8202;&#8212;
  </text>
  <!-- Sub-copy line 2 -->
  <text x="130" y="656"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="32" font-weight="300" fill="#94a3b8" letter-spacing="0.5">
    not your model choice.
  </text>

  <!-- Bottom divider -->
  <rect x="130" y="790" width="1340" height="1" fill="#ffffff" fill-opacity="0.08"/>

  <!-- Author bottom-left -->
  <text x="130" y="840"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="600" fill="#475569">
    Altaf Shaikh
  </text>
  <text x="130" y="872"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" fill="#334155">
    AI Engineering
  </text>

  <!-- Read time top-right -->
  <text x="1470" y="132"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" text-anchor="end" fill="#334155">
    8 min read
  </text>
</svg>
