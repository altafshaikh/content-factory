<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a1424"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.28" r="0.55">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#glow)"/>

  <!-- Top accent bar -->
  <rect x="80" y="86" width="180" height="5" rx="3" fill="url(#accent)"/>

  <!-- Series label -->
  <text x="80" y="156"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="700" letter-spacing="8" fill="#64748b">
    AI EXPERIMENT #1
  </text>

  <!-- Contrast block — Codex (white) -->
  <text x="80" y="396"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="64" font-weight="800" fill="#f1f5f9" letter-spacing="-1.5">
    Codex opened
  </text>
  <text x="80" y="474"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="64" font-weight="800" fill="#f1f5f9" letter-spacing="-1.5">
    the browser.
  </text>

  <!-- Contrast block — Claude (payoff, purple) -->
  <text x="80" y="618"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="64" font-weight="800" fill="#cbd5e1" letter-spacing="-1.5">
    Claude needed
  </text>
  <text x="80" y="696"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="64" font-weight="800" fill="url(#accent)" letter-spacing="-1.5">
    another prompt.
  </text>

  <!-- Rule -->
  <rect x="80" y="772" width="920" height="1" fill="#ffffff" fill-opacity="0.1"/>

  <!-- Handle (prominent, accent) -->
  <text x="80" y="852"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="40" font-weight="700" fill="url(#accent)">
    @teachmebro
  </text>

  <!-- Author byline -->
  <text x="80" y="904"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="600" fill="#94a3b8">
    Altaf Shaikh
  </text>
  <text x="80" y="940"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" fill="#475569">
    AI Engineering
  </text>

  <!-- Bottom accent -->
  <rect x="80" y="982" width="920" height="3" rx="2" fill="url(#accent)" fill-opacity="0.35"/>
</svg>
