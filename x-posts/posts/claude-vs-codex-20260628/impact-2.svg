<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="55%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glowTR" cx="1" cy="0" r="0.9">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBL" cx="0" cy="1" r="0.7">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glowTR)"/>
  <rect width="1600" height="900" fill="url(#glowBL)"/>

  <!-- Top label -->
  <text x="130" y="120"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="700" letter-spacing="8" fill="#22d3ee">
    AI EXPERIMENT #1  &#183;  FRONTEND, ONE TASK
  </text>

  <!-- Vertical split divider -->
  <rect x="798" y="180" width="3" height="520" rx="2" fill="#ffffff" fill-opacity="0.1"/>

  <!-- ===== LEFT COLUMN: CODEX ===== -->
  <text x="130" y="300"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="76" font-weight="900" fill="url(#accent)" letter-spacing="-2">
    Codex
  </text>
  <rect x="130" y="332" width="240" height="3" rx="2" fill="url(#accent)" fill-opacity="0.7"/>

  <text x="130" y="438"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="38" font-weight="400" fill="#e2e8f0">
    Opened the browser.
  </text>
  <text x="130" y="500"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="38" font-weight="400" fill="#e2e8f0">
    Tested the flow itself.
  </text>
  <text x="130" y="580"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30" font-weight="300" fill="#64748b">
    No re-explaining.
  </text>

  <!-- ===== RIGHT COLUMN: CLAUDE ===== -->
  <text x="860" y="300"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="76" font-weight="900" fill="#94a3b8" letter-spacing="-2">
    Claude
  </text>
  <rect x="860" y="332" width="240" height="3" rx="2" fill="#ffffff" fill-opacity="0.12"/>

  <text x="860" y="438"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="38" font-weight="400" fill="#cbd5e1">
    Wrote clean code.
  </text>
  <text x="860" y="500"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="38" font-weight="400" fill="#cbd5e1">
    Needed another prompt.
  </text>
  <text x="860" y="580"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30" font-weight="300" fill="#64748b">
    Three more, actually.
  </text>

  <!-- Verdict line -->
  <text x="130" y="688"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30" font-weight="300" fill="#94a3b8" letter-spacing="0.5">
    Same task. Clean code from both &#8212; only one acted on the intention.
  </text>

  <!-- Bottom divider -->
  <rect x="130" y="790" width="1340" height="1" fill="#ffffff" fill-opacity="0.08"/>

  <!-- Handle (prominent, accent) bottom-left -->
  <text x="130" y="846"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="34" font-weight="700" fill="url(#accent)">
    @teachmebro
  </text>
  <text x="130" y="880"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" fill="#475569">
    Altaf Shaikh  &#183;  AI Engineering
  </text>

  <!-- Tagline top-right -->
  <text x="1470" y="120"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" text-anchor="end" fill="#334155">
    right tool, right job
  </text>
</svg>
