<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.15" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#glow)"/>

  <!-- Decorative quotation mark (background) -->
  <text x="60" y="320"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="340" font-weight="700" fill="url(#accent)" fill-opacity="0.08">&#8220;</text>

  <!-- Top accent bar -->
  <rect x="80" y="80" width="180" height="5" rx="3" fill="url(#accent)"/>

  <!-- Label -->
  <text x="80" y="150"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="700" letter-spacing="7" fill="#334155">
    AI &#183; THE REAL COST
  </text>

  <!-- Quote line 1 -->
  <text x="80" y="400"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="62" font-weight="700" fill="#f1f5f9" letter-spacing="-1">
    Free tier is a
  </text>

  <!-- Quote line 2 -->
  <text x="80" y="472"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="62" font-weight="700" fill="#f1f5f9" letter-spacing="-1">
    pricing decision.
  </text>

  <!-- Quote line 3 — gradient accent -->
  <text x="80" y="544"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="62" font-weight="700" fill="url(#accent)" letter-spacing="-1">
    Not a physics one.
  </text>

  <!-- Rule -->
  <rect x="80" y="606" width="920" height="1" fill="#ffffff" fill-opacity="0.10"/>

  <!-- Tagline -->
  <text x="80" y="660"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="300" fill="#64748b">
    The cost didn&#8217;t disappear. It moved.
  </text>

  <!-- Handle (prominent, accent) -->
  <text x="80" y="730"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="34" font-weight="700" fill="#22d3ee">
    @teachmebro
  </text>

  <!-- Author + domain -->
  <text x="80" y="778"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" fill="#475569">
    Altaf Shaikh &#183; AI Engineering / Tech
  </text>

  <!-- Bottom accent bar -->
  <rect x="80" y="980" width="920" height="3" rx="2" fill="url(#accent)" fill-opacity="0.35"/>
</svg>
