<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="55%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glowTR" cx="1" cy="0" r="0.9">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBL" cx="0" cy="1" r="0.7">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glowTR)"/>
  <rect width="1600" height="900" fill="url(#glowBL)"/>

  <!-- Left vertical accent bar -->
  <rect x="80" y="60" width="4" height="780" rx="2" fill="url(#accentV)" fill-opacity="0.5"/>

  <!-- Category label -->
  <text x="108" y="120"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="700" letter-spacing="8" fill="#22d3ee">
    AI ENGINEERING &#183; COST REALITY
  </text>

  <!-- ── LEFT PANEL: YOUR BILL ── -->
  <text x="108" y="200"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="700" letter-spacing="8" fill="#475569">
    YOUR BILL
  </text>

  <!-- $0.00 hero number -->
  <text x="108" y="400"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="150" font-weight="900" fill="#f1f5f9" letter-spacing="-4">
    $0.00
  </text>

  <!-- per query -->
  <text x="112" y="455"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="300" fill="#64748b" letter-spacing="1">
    per query
  </text>

  <!-- Vertical divider -->
  <rect x="760" y="148" width="1" height="592" rx="1" fill="#ffffff" fill-opacity="0.07"/>

  <!-- ── RIGHT PANEL: NATURE'S INVOICE ── -->
  <text x="808" y="200"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" font-weight="700" letter-spacing="8" fill="#475569">
    NATURE&#8217;S INVOICE
  </text>

  <!-- "gallons of" -->
  <text x="808" y="295"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="34" font-weight="300" fill="#94a3b8">
    gallons of
  </text>

  <!-- "drinkable" gradient -->
  <text x="808" y="415"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="110" font-weight="900" fill="url(#accent)" letter-spacing="-2">
    drinkable
  </text>

  <!-- "water." white -->
  <text x="808" y="540"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="110" font-weight="900" fill="#f1f5f9" letter-spacing="-2">
    water.
  </text>

  <!-- sub-note -->
  <text x="808" y="608"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="300" fill="#475569">
    The kind the world doesn&#8217;t have enough of.
  </text>

  <!-- Bottom divider -->
  <rect x="108" y="748" width="1412" height="1" fill="#ffffff" fill-opacity="0.08"/>

  <!-- Tagline -->
  <text x="108" y="792"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="600" fill="#94a3b8" letter-spacing="-0.5">
    The cost didn&#8217;t disappear. It moved.
  </text>

  <!-- Handle -->
  <text x="108" y="836"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="700" fill="#22d3ee">
    @teachmebro
  </text>

  <!-- Author + domain -->
  <text x="108" y="868"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="19" font-weight="400" fill="#334155">
    Altaf Shaikh &#183; AI Engineering / Tech
  </text>
</svg>
